<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spencer Hicks — Painter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:#1a1714;
      --warm:#f7f4ef;
      --mid:#e8e3da;
      --muted:#8a8278;
      --rule:#c9c3b8;
      --accent:#7a3e2a;
    }

    body {
      background: var(--warm);
      color: var(--ink);
      font-family: Inter, sans-serif;
      font-weight: 300;
      line-height: 1.6;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display:flex;
      justify-content:space-between;
      padding:1.5rem 3rem;
      background: var(--warm);
      border-bottom:1px solid var(--rule);
      z-index:100;
    }

    .nav-name {
      font-family:"Cormorant Garamond", serif;
      font-size:1.25rem;
      text-decoration:none;
      color:var(--ink);
    }

    .nav-links {
      display:flex;
      gap:2rem;
      list-style:none;
    }

    .nav-links a {
      text-decoration:none;
      font-size:0.7rem;
      letter-spacing:0.12em;
      text-transform:uppercase;
      color:var(--muted);
    }

    main { padding-top:6rem; }

    section {
      max-width:1200px;
      margin:0 auto;
      padding:4rem 2rem;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
      gap:2rem;
    }

    .painting { cursor:pointer; }

    .painting-img {
      background:var(--mid);
      aspect-ratio: 4/5;
      overflow:hidden;
      margin-bottom:0.8rem;
    }

    .painting-img img {
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .painting-title {
      font-family:"Cormorant Garamond", serif;
      font-style:italic;
      font-size:1.1rem;
    }

    .painting-meta {
      font-size:0.7rem;
      color:var(--muted);
    }

    .painting-price {
      font-size:0.75rem;
    }

    .status-available { color:var(--accent); }
    .status-sold { color:var(--muted); text-decoration:line-through; }

    /* LIGHTBOX */
    .lightbox {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      display:none;
      align-items:center;
      justify-content:center;
      padding:2rem;
      z-index:200;
    }

    .lightbox.open { display:flex; }

    .lightbox-inner {
      display:grid;
      grid-template-columns:1fr;
      max-width:900px;
      width:100%;
      gap:1rem;
    }

    .lightbox-img img {
      max-width:100%;
      max-height:80vh;
      display:block;
      margin:auto;
    }

    .lightbox-info {
      color:#f7f4ef;
    }

    .lightbox-title {
      font-family:"Cormorant Garamond", serif;
      font-size:1.6rem;
      font-style:italic;
    }

    .lightbox-meta {
      font-size:0.8rem;
      color:#ccc;
      margin:0.5rem 0;
    }

    .lightbox-price {
      font-size:0.9rem;
    }

    .lightbox-close {
      position:fixed;
      top:1rem;
      right:1rem;
      background:none;
      border:none;
      font-size:2rem;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<nav>
  <a href="#work" class="nav-name">Spencer Hicks</a>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<main>

<section id="work">
  <div class="grid" id="grid"></div>
</section>

</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="closeBtn">×</button>
  <div class="lightbox-inner">
    <div class="lightbox-img" id="lbImg"></div>
    <div class="lightbox-info">
      <div class="lightbox-title" id="lbTitle"></div>
      <div class="lightbox-meta" id="lbMeta"></div>
      <div class="lightbox-price" id="lbPrice"></div>
    </div>
  </div>
</div>

<script>
const paintings = [
  {
    title:"The Flop",
    year:2026,
    medium:"Oil on canvas",
    dimensions:"60x75",
    image:"IMG_1219.JPEG",
    available:true,
    price:null
  },
  {
    title:"Tennis Kitchen",
    year:2026,
    medium:"Oil on panel",
    dimensions:"8x10",
    image:"IMG_0794.JPEG",
    available:false,
    price:null
  }
];

let current = 0;

const grid = document.getElementById("grid");
const lightbox = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");
const lbTitle = document.getElementById("lbTitle");
const lbMeta = document.getElementById("lbMeta");
const lbPrice = document.getElementById("lbPrice");

/* RENDER GRID */
paintings.forEach((p,i)=>{
  const div = document.createElement("div");
  div.className = "painting";

  div.innerHTML = `
    <div class="painting-img">
      <img src="images/${p.image}" />
    </div>
    <div class="painting-title">${p.title}</div>
    <div class="painting-meta">${p.year} · ${p.medium} · ${p.dimensions}</div>
    <div class="painting-price ${p.available ? "status-available":"status-sold"}">
      ${p.available ? "Available" : "Sold"}
    </div>
  `;

  div.onclick = () => open(i);
  grid.appendChild(div);
});

/* LIGHTBOX */
function open(i){
  current = i;
  render();
  lightbox.classList.add("open");
}

function close(){
  lightbox.classList.remove("open");
}

function render(){
  const p = paintings[current];

  lbImg.innerHTML = `<img src="images/${p.image}" />`;
  lbTitle.textContent = p.title;
  lbMeta.textContent = `${p.year} · ${p.medium} · ${p.dimensions}`;
  lbPrice.textContent = p.available ? "Available" : "Sold";
}

/* NAV */
function next(dir){
  current += dir;
  if(current < 0) current = paintings.length - 1;
  if(current >= paintings.length) current = 0;
  render();
}

/* EVENTS */
document.getElementById("closeBtn").onclick = close;

lightbox.onclick = (e)=>{
  if(e.target === lightbox) close();
};

document.addEventListener("keydown",(e)=>{
  if(!lightbox.classList.contains("open")) return;

  if(e.key==="Escape") close();
  if(e.key==="ArrowLeft") next(-1);
  if(e.key==="ArrowRight") next(1);
});
</script>

</body>
</html>
